<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCPR Officer Rotation Plan</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header no-print">
        <h1>NCPR Officer Rotation Plan</h1>
        <div class="controls">
            <button onclick="openAddModal()">+ Add/Edit Staff</button>
            <button onclick="exportJSON()">Save JSON</button>
            <label class="btn-upload">Load JSON <input type="file" id="importJson" accept=".json" onchange="importJSON(event)"></label>
            <button onclick="exportCSV()">Export CSV</button>
            <label class="btn-upload">Import CSV <input type="file" id="importCsv" accept=".csv" onchange="importCSV(event)"></label>
            <button onclick="window.print()">Print</button>
        </div>
    </div>

    <div class="legend no-print">
        <div class="legend-item"><span class="box bg-summer"></span> Summer (Jun-Jul)</div>
        <div class="legend-item"><span class="box bg-fall"></span> Fall (Aug-Dec)</div>
        <div class="legend-item"><span class="box bg-spring"></span> Spring (Jan-May)</div>
        <div class="legend-item" style="margin-left:20px;"><strong>Segments:</strong></div>
        <div class="legend-item"><span class="box" style="background: repeating-linear-gradient(45deg, #ccc, #ccc 3px, #999 3px, #999 6px);"></span> Inbound T/O</div>
        <div class="legend-item"><span class="box" style="background: #555;"></span> Active Billet</div>
        <div class="legend-item"><span class="box" style="background: repeating-linear-gradient(-45deg, #333, #333 3px, #999 3px, #999 6px);"></span> Outbound T/O</div>
        <div class="legend-item"><span class="box" style="background: #ffcc00;"></span> Skillbridge</div>
        <div class="legend-item"><span class="box" style="background: #ff9999;"></span> Terminal Leave</div>
    </div>

    <div class="gantt-container" id="ganttContainer" onscroll="handleScroll()">
        <button id="snapBtn" class="snap-button no-print" onclick="snapToPresent()">📍 Snap to Today</button>
        <div id="ganttGridTarget"></div>
    </div>

    <div id="staffModal" class="modal no-print">
        <div class="modal-content">
            <h2 id="modalTitle">Add Staff Member</h2>
            <form id="staffForm">
                <input type="hidden" id="staffId">
                
                <div class="form-group full-width">
                    <label>Name (Use "Unknown" for TBD):</label>
                    <input type="text" id="staffName" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Unit:</label>
                        <select id="staffUnit">
                            <option value="UNC">UNC</option>
                            <option value="Duke">Duke</option>
                            <option value="NCSU">NCSU</option>
                            <option value="NCPR">NCPR Consortium</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Billet / Designator:</label>
                        <input type="text" id="staffBillet" placeholder="e.g. SWO, Aviator" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Report Date:</label>
                        <input type="month" id="staffReport" required>
                    </div>
                    <div class="form-group">
                        <label>TiHE Completion:</label>
                        <input type="month" id="staffTihe">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>PRD / EAOS:</label>
                        <input type="month" id="staffPrd" required>
                    </div>
                    <div class="form-group">
                        <label>Skillbridge Start:</label>
                        <input type="month" id="staffSkillbridge">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Terminal Leave Start:</label>
                        <input type="month" id="staffTerminal">
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button type="button" id="deleteBtn" class="btn-danger" style="display:none;" onclick="deleteStaff()">Delete</button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
